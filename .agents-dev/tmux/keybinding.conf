# .agents-dev/tmux/keybinding.conf — generated from keybinding.conf.template by install.sh
#
# 3-agent team layout — bind R to spawn Gemini/Codex dashboards alongside the
# main (Claude) pane in the current tmux window.
#
# ── Install ──────────────────────────────────────────────────────────────────
# install.sh substitutes /home/ithaca74/GitHub/mnc-AI-multi-agent with the absolute path of
# the target repo at install time, then writes this file (without the
# .template suffix) into <target>/.agents-dev/tmux/keybinding.conf.
#
# After install, add ONE of these lines to your ~/.tmux.conf:
#
#   source-file /home/ithaca74/GitHub/mnc-AI-multi-agent/.agents-dev/tmux/keybinding.conf
#
# Or copy the bind-key line below directly into your ~/.tmux.conf.
#
# Then reload tmux config:
#
#   tmux source-file ~/.tmux.conf
#
# ── Usage ────────────────────────────────────────────────────────────────────
# Inside any tmux window, press your prefix (default: Ctrl-b) followed by R.
# The current pane is split into a 3-pane layout: Claude (left, where you ran
# this) + Gemini dashboard (top-right) + Codex dashboard (bottom-right).

bind-key R run-shell "/home/ithaca74/GitHub/mnc-AI-multi-agent/.agents-dev/scripts/team-layout.sh --here"
